name: summary-telegram

# 요약 이미지(테마 4종 × 3장)를 만들어 테마별 앨범으로 텔레그램에 발송.
# 점심·장마감 하루 2회. GitHub Actions cron 은 UTC → KST 12:33/15:33 == UTC 03:33/06:33.
on:
  schedule:
    - cron: "33 3 * * 1-5"   # 월~금 UTC 03:33 == KST 12:33 (점심)
    - cron: "33 6 * * 1-5"   # 월~금 UTC 06:33 == KST 15:33 (장마감)
  workflow_dispatch:          # 수동 실행도 허용

concurrency:
  group: summary-telegram
  cancel-in-progress: true

jobs:
  summary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install pandas requests lxml pillow

      # 요약 이미지 캡처에 필요한 헤드리스 Chrome.
      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1
        id: chrome

      - name: Build report + summary images
        env:
          SITE_BASE_URL: ${{ secrets.SITE_BASE_URL }}
          WEB3FORMS_KEY: ${{ secrets.WEB3FORMS_KEY }}
          FEEDBACK_EMAIL: ${{ secrets.FEEDBACK_EMAIL }}
          CHROME_PATH: ${{ steps.chrome.outputs.chrome-path }}
          TZ: Asia/Seoul
        run: |
          set -e
          # 1) 오늘(KST) 스냅샷으로 빌드 시도. 휴장/장전이면 exit 1 로 끝나지만 무시.
          python main.py --market kr --force || echo "오늘 빌드 스킵(휴장/장전일 수 있음)"
          # 2) 빌드된 리포트가 없으면(휴장·러너 초기상태) 최신 거래일 CSV 로 폴백 빌드.
          #    output/kr/data/market_*.csv 는 git 에 포함되므로 러너에서도 사용 가능.
          if ! ls output/kr/report/*].html >/dev/null 2>&1; then
            LATEST=$(ls output/kr/data/market_*.csv | sed -E 's/.*market_([0-9]{8})\.csv/\1/' | sort | tail -1)
            echo "리포트 없음 → 최신 거래일($LATEST)로 폴백 빌드"
            python main.py --market kr --date "$LATEST"
          fi
          # 3) 가장 최근 리포트로 요약 이미지 생성(4테마 × 3장 = 12장)
          python -m scripts.make_summary_images

      - name: Send to Telegram
        env:
          BOT: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
          TZ: Asia/Seoul
        run: |
          set -e
          # 가장 최근 생성된 summary 폴더(날짜) 찾기. 하위에 테마별(modeN) 폴더가 들어있다.
          DIR=$(ls -d output/kr/summary/*/ 2>/dev/null | sort | tail -1)
          if [ -z "$DIR" ]; then
            echo "요약 이미지가 없습니다 — 발송 스킵 (휴장일일 수 있음)"
            exit 0
          fi
          DATE=$(basename "$DIR")
          STAMP=$(date '+%Y-%m-%d %H:%M KST')
          echo "발송 대상: $DIR ($DATE)"

          # 테마 키 → 한글 라벨 (characters.json/report.css 와 동일)
          theme_label () {
            case "$1" in
              mode1) echo "파스텔" ;; mode2) echo "다크" ;;
              mode3) echo "전문가" ;; mode4) echo "세피아" ;;
              *) echo "$1" ;;
            esac
          }

          # 한 테마(3장)를 앨범(sendMediaGroup)으로 전송. 캡션은 앨범 첫 장에만.
          sent=0
          for theme in mode1 mode2 mode3 mode4; do
            tdir="${DIR}${theme}/"
            files=("${tdir}summary-1.png" "${tdir}summary-2.png" "${tdir}summary-3.png")
            # 3장이 모두 있어야 앨범 전송
            ok=1; for f in "${files[@]}"; do [ -f "$f" ] || ok=0; done
            [ "$ok" -eq 1 ] || { echo "스킵: $theme (이미지 누락)"; continue; }

            cap="📊 Market Brief ${DATE} · $(theme_label "$theme") · ${STAMP}"
            # media 배열(JSON) + 파일 첨부를 함께 구성
            media="[{\"type\":\"photo\",\"media\":\"attach://p1\",\"caption\":\"${cap}\"},"
            media+="{\"type\":\"photo\",\"media\":\"attach://p2\"},"
            media+="{\"type\":\"photo\",\"media\":\"attach://p3\"}]"
            curl -sS -X POST "https://api.telegram.org/bot${BOT}/sendMediaGroup" \
              -F "chat_id=${CHAT}" \
              -F "media=${media}" \
              -F "p1=@${files[0]}" \
              -F "p2=@${files[1]}" \
              -F "p3=@${files[2]}" >/dev/null
            echo "발송: $theme 앨범 3장"
            sent=$((sent+1))
          done
          echo "텔레그램 발송 완료: ${sent}개 테마 앨범"
