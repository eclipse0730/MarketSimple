name: summary-telegram

# 요약 이미지(테마 4종 × 3장)를 만들어 테마별 앨범으로 텔레그램에 발송.
# 오전장·장마감 하루 2회. 스케줄은 GitHub cron 대신 Cloud Scheduler 가 트리거한다
# (ms-summary-am: KST 11:58, ms-summary-pm: KST 15:33). 설정: cloud/SCHEDULER.md
# 상단 문구의 오전장/장마감 구분은 make_summary_images 가 실행 시각(KST 14시)으로 자동 판단.
on:
  # schedule:  # ← Cloud Scheduler(ms-summary-am/pm)로 이관. 중복 실행 방지 위해 비활성.
  #   - cron: "58 2 * * 1-5"   # 월~금 UTC 02:58 == KST 11:58 (오전장)
  #   - cron: "33 6 * * 1-5"   # 월~금 UTC 06:33 == KST 15:33 (장마감)
  workflow_dispatch:          # Cloud Run 이 이 통로로 트리거(수동 실행도 허용)

concurrency:
  group: summary-telegram
  cancel-in-progress: true

jobs:
  summary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install pandas requests lxml pillow

      # 요약 이미지 캡처에 필요한 헤드리스 Chrome.
      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1
        id: chrome

      # 러너에 한글 폰트가 없으면 Chrome 캡처에서 한글이 □□□(두부)로 깨진다.
      # report.css 의 --sans/--round 폴백이 우분투엔 없는 폰트라 Noto CJK 로 받쳐준다.
      - name: Install Korean fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk fonts-nanum
          fc-cache -f

      # 리포트 빌드 → 요약 이미지 생성 → 테마별 즉시 발송까지 한 스텝에서 처리.
      # make_summary_images 가 각 테마 3장을 만든 직후 곧바로 텔레그램 앨범을 보낸다
      # (TELEGRAM_BOT_TOKEN/CHAT_ID 가 있을 때). 빠른 테마부터 순차 도착한다.
      - name: Build report + summary images + send
        env:
          SITE_BASE_URL: ${{ secrets.SITE_BASE_URL }}
          WEB3FORMS_KEY: ${{ secrets.WEB3FORMS_KEY }}
          FEEDBACK_EMAIL: ${{ secrets.FEEDBACK_EMAIL }}
          CHROME_PATH: ${{ steps.chrome.outputs.chrome-path }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TZ: Asia/Seoul
        run: |
          set -e
          # 1) 오늘(KST) 스냅샷으로 빌드 시도. 휴장/장전이면 exit 1 로 끝나지만 무시.
          python main.py --market kr --force || echo "오늘 빌드 스킵(휴장/장전일 수 있음)"
          # 2) 빌드된 리포트가 없으면(휴장·러너 초기상태) 최신 거래일 CSV 로 폴백 빌드.
          #    output/kr/data/market_*.csv 는 git 에 포함되므로 러너에서도 사용 가능.
          if ! ls output/kr/report/*].html >/dev/null 2>&1; then
            LATEST=$(ls output/kr/data/market_*.csv | sed -E 's/.*market_([0-9]{8})\.csv/\1/' | sort | tail -1)
            echo "리포트 없음 → 최신 거래일($LATEST)로 폴백 빌드"
            python main.py --market kr --date "$LATEST"
          fi
          # 3) 요약 이미지 생성(4테마 × 3장) + 테마별 즉시 텔레그램 발송
          python -m scripts.make_summary_images
