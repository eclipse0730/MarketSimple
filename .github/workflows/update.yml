name: update-report

# 한국 장중(09:07~15:37 KST) 30분마다 자동 수집·빌드·배포.
# GitHub Actions cron 은 UTC 기준 → KST 09:07~15:37 == UTC 00:07~06:37.
# 정각/30분 cron 은 GitHub Actions 혼잡 시간대에 지연·드롭될 수 있어 7분 오프셋을 둔다.
on:
  schedule:
    - cron: "7,37 0-6 * * 1-5"   # 월~금 UTC 00:07,00:37 … 06:37
  workflow_dispatch:             # 수동 실행도 허용

# 동시에 두 번 돌지 않게 (밀린 실행은 취소)
concurrency:
  group: update-report
  cancel-in-progress: true

permissions:
  contents: write   # 커밋·push 권한

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install pandas requests lxml

      - name: Collect + build + publish (intraday)
        env:
          SITE_BASE_URL: ${{ secrets.SITE_BASE_URL }}
          CUSTOM_DOMAIN: ${{ secrets.CUSTOM_DOMAIN }}
          GA_MEASUREMENT_ID: ${{ secrets.GA_MEASUREMENT_ID }}
          WEB3FORMS_KEY: ${{ secrets.WEB3FORMS_KEY }}
          FEEDBACK_EMAIL: ${{ secrets.FEEDBACK_EMAIL }}
          TZ: Asia/Seoul
        run: |
          # 오늘(KST) 스냅샷 수집 + 리포트 빌드
          python main.py --market kr --force
          # 장중 발행: 최신 날짜만 갱신 + 썸네일 생략
          python scripts/publish_pages.py --intraday

      - name: Commit & push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/ output/kr/data/market_*.csv
          if git diff --cached --quiet; then
            echo "변경 없음 — 커밋 스킵 (휴장일이거나 데이터 동일)"
          else
            git commit -m "자동 업데이트 $(date '+%Y-%m-%d %H:%M KST')"
            git push
          fi
